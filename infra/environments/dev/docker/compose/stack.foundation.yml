# Purpose: Configuration artifact for OAL platform infrastructure.
# Environment scope: dev
# Consumer: docker compose
# Secret handling: do not commit real secret values; use environment-specific secret stores.
# Override priority: runtime environment variables > deployment overlays > file defaults.
services:
  postgres:
    image: postgres:16
    container_name: oal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: oal
      POSTGRES_USER: oal
      POSTGRES_PASSWORD: oal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oal -d oal"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: oal-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: oal
      RABBITMQ_DEFAULT_PASS: oal
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    # Redis OSS (free/open source distribution)
    image: redis:7.2-alpine
    container_name: oal-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: oal-keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8088:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
