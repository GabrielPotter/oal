# Purpose: Configuration artifact for OAL platform infrastructure.
# Environment scope: gcp
# Consumer: kustomize/kubectl
# Secret handling: do not commit real secret values; use environment-specific secret stores.
# Override priority: runtime environment variables > deployment overlays > file defaults.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - configmap.yaml
  - runtime-secrets.template.yaml
  - gateway-api.deployment.yaml
  - gateway-api.service.yaml
  - identity-api.deployment.yaml
  - identity-api.service.yaml
  - catalog-api.deployment.yaml
  - catalog-api.service.yaml
  - web-nginx.deployment.yaml
  - web-nginx.service.yaml
