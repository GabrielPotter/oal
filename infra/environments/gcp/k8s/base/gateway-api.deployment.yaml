# Purpose: Configuration artifact for OAL platform infrastructure.
# Environment scope: gcp
# Consumer: kustomize/kubectl
# Secret handling: do not commit real secret values; use environment-specific secret stores.
# Override priority: runtime environment variables > deployment overlays > file defaults.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-api
  template:
    metadata:
      labels:
        app: gateway-api
    spec:
      containers:
        - name: gateway-api
          image: ghcr.io/oal/gateway-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: Runtime__PlatformTarget
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: PLATFORM_TARGET
            - name: Authentication__Authority
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: AUTHORITY_URL
            - name: Authentication__Audience
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: AUTH_AUDIENCE
            - name: Authentication__RequireHttpsMetadata
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: AUTH_REQUIRE_HTTPS_METADATA
            - name: Authorization__RequiredScope
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: AUTH_SCOPE
            - name: Authorization__TenantClaim
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: AUTH_TENANT_CLAIM
            - name: Encryption__ApplicationName
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: ENCRYPTION_APP_NAME
            - name: Messaging__Broker
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: MESSAGING_BROKER
            - name: Messaging__Port
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: MESSAGING_PORT
            - name: Messaging__VirtualHost
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: MESSAGING_VHOST
            - name: Messaging__Exchange
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: MESSAGING_EXCHANGE
            - name: Frontend__AllowedOrigins__0
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: FRONTEND_ALLOWED_ORIGINS
            - name: FrontendAuth__Authority
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: FRONTEND_AUTH_AUTHORITY
            - name: FrontendAuth__Realm
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: FRONTEND_AUTH_REALM
            - name: FrontendAuth__ClientId
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: FRONTEND_AUTH_CLIENT_ID
            - name: FrontendAuth__Scope
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: FRONTEND_AUTH_SCOPE
            - name: FrontendAuth__RedirectUri
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: FRONTEND_AUTH_REDIRECT_URI
            - name: FrontendAuth__PostLogoutRedirectUri
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: FRONTEND_AUTH_POST_LOGOUT_REDIRECT_URI
            - name: InternalServices__Services__0__Name
              value: identity
            - name: InternalServices__Services__0__BaseUrl
              value: http://identity-api:8080
            - name: InternalServices__Services__1__Name
              value: catalog
            - name: InternalServices__Services__1__BaseUrl
              value: http://catalog-api:8080
            - name: Persistence__ConnectionString
              valueFrom:
                secretKeyRef:
                  name: platform-runtime-secrets
                  key: PERSISTENCE_CONNECTION_STRING
            - name: Messaging__Host
              valueFrom:
                secretKeyRef:
                  name: platform-runtime-secrets
                  key: MESSAGING_HOST
            - name: Messaging__Username
              valueFrom:
                secretKeyRef:
                  name: platform-runtime-secrets
                  key: MESSAGING_USERNAME
            - name: Messaging__Password
              valueFrom:
                secretKeyRef:
                  name: platform-runtime-secrets
                  key: MESSAGING_PASSWORD
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
