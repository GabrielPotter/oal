# Purpose: Configuration artifact for OAL platform infrastructure.
# Environment scope: onprem
# Consumer: kubernetes secret/bootstrap
# Secret handling: do not commit real secret values; use environment-specific secret stores.
# Override priority: runtime environment variables > deployment overlays > file defaults.
apiVersion: v1
kind: Secret
metadata:
  name: platform-runtime-secrets
  namespace: oal-prod
type: Opaque
stringData:
  PERSISTENCE_CONNECTION_STRING: "Host=postgres;Port=5432;Database=oal;Username=oal;Password=REPLACE_ME"
  MESSAGING_HOST: "rabbitmq"
  MESSAGING_USERNAME: "REPLACE_ME"
  MESSAGING_PASSWORD: "REPLACE_ME"
