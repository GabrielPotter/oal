# Purpose: Configuration artifact for OAL platform infrastructure.
# Environment scope: onprem
# Consumer: docker compose
# Secret handling: do not commit real secret values; use environment-specific secret stores.
# Override priority: runtime environment variables > deployment overlays > file defaults.
services:
  web-nginx:
    build:
      context: ../../../../..
      dockerfile: src/ui/web-app/Dockerfile
    container_name: oal-web-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../../edge/nginx/default-https.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - gateway-api

  gateway-api:
    build:
      context: ../../../../..
      dockerfile: src/services/Gateway/Gateway.Api/Dockerfile
    container_name: oal-gateway-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Runtime__PlatformTarget: onprem
      Authentication__Authority: https://id.example.com/realms/oal
      Authentication__Audience: oal.api
      Authentication__RequireHttpsMetadata: true
      Authorization__RequiredScope: oal.api
      Authorization__TenantClaim: tenant_id
      FrontendAuth__Authority: https://id.example.com/realms/oal
      FrontendAuth__Realm: oal
      FrontendAuth__ClientId: web-app
      FrontendAuth__Scope: openid profile email
      FrontendAuth__RedirectUri: https://app.example.com/app
      FrontendAuth__PostLogoutRedirectUri: https://app.example.com/login
      Edge__PublicUrl: https://app.example.com
      Edge__TlsMode: onprem-nginx
      Edge__KeycloakPublicUrl: https://id.example.com/realms/oal
      Edge__GatewayInternalUrl: http://gateway-api:8080
      InternalServices__Services__0__Name: identity
      InternalServices__Services__0__BaseUrl: http://identity-api:8080
      InternalServices__Services__1__Name: catalog
      InternalServices__Services__1__BaseUrl: http://catalog-api:8080
      Persistence__ConnectionString: ${PERSISTENCE_CONNECTION_STRING:?set in .env}
      Messaging__Broker: rabbitmq
      Messaging__Host: rabbitmq
      Messaging__Port: 5672
      Messaging__Username: ${RABBITMQ_USERNAME:?set in .env}
      Messaging__Password: ${RABBITMQ_PASSWORD:?set in .env}
      Encryption__ApplicationName: oal-platform
    depends_on:
      - identity-api
      - catalog-api
      - keycloak

  identity-api:
    build:
      context: ../../../../..
      dockerfile: src/services/Identity/Identity.Api/Dockerfile
    container_name: oal-identity-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Runtime__PlatformTarget: onprem
      Authentication__Authority: http://keycloak:8080/realms/oal
      Authentication__Audience: oal.api
      Authentication__RequireHttpsMetadata: false
      Authorization__RequiredScope: oal.api
      Authorization__TenantClaim: tenant_id
      Persistence__ConnectionString: ${PERSISTENCE_CONNECTION_STRING:?set in .env}
      Messaging__Broker: rabbitmq
      Messaging__Host: rabbitmq
      Messaging__Port: 5672
      Messaging__Username: ${RABBITMQ_USERNAME:?set in .env}
      Messaging__Password: ${RABBITMQ_PASSWORD:?set in .env}
      Encryption__ApplicationName: oal-platform

  catalog-api:
    build:
      context: ../../../../..
      dockerfile: src/services/Catalog/Catalog.Api/Dockerfile
    container_name: oal-catalog-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Runtime__PlatformTarget: onprem
      Authentication__Authority: http://keycloak:8080/realms/oal
      Authentication__Audience: oal.api
      Authentication__RequireHttpsMetadata: false
      Authorization__RequiredScope: oal.api
      Authorization__TenantClaim: tenant_id
      Persistence__ConnectionString: ${PERSISTENCE_CONNECTION_STRING:?set in .env}
      Messaging__Broker: rabbitmq
      Messaging__Host: rabbitmq
      Messaging__Port: 5672
      Messaging__Username: ${RABBITMQ_USERNAME:?set in .env}
      Messaging__Password: ${RABBITMQ_PASSWORD:?set in .env}
      Encryption__ApplicationName: oal-platform

  postgres:
    image: postgres:16
    container_name: oal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: oal
      POSTGRES_USER: ${POSTGRES_USERNAME:?set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    container_name: oal-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: oal-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:?set in .env}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?set in .env}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: oal-keycloak
    restart: unless-stopped
    command: start --hostname id.example.com --http-enabled=true --proxy-headers xforwarded
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: oal
      KC_DB_USERNAME: ${POSTGRES_USERNAME:?set in .env}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:?set in .env}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?set in .env}
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
