# Purpose: Configuration artifact for OAL platform infrastructure.
# Environment scope: onprem
# Consumer: kustomize/kubectl
# Secret handling: do not commit real secret values; use environment-specific secret stores.
# Override priority: runtime environment variables > deployment overlays > file defaults.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: oal-test
resources:
  - ../../../../gcp/k8s/base
  - ingress-onprem.yaml
patchesStrategicMerge:
  - gateway-secret-mount.patch.yaml
configMapGenerator:
  - name: platform-config
    behavior: merge
    literals:
      - PLATFORM_TARGET=onprem
      - AUTHORITY_URL=https://id-test.onprem.example.com/realms/oal
      - FRONTEND_ALLOWED_ORIGINS=https://app-test.onprem.example.com
      - FRONTEND_AUTH_AUTHORITY=https://id-test.onprem.example.com/realms/oal
      - FRONTEND_AUTH_REDIRECT_URI=https://app-test.onprem.example.com/app
      - FRONTEND_AUTH_POST_LOGOUT_REDIRECT_URI=https://app-test.onprem.example.com/login
generatorOptions:
  disableNameSuffixHash: true
